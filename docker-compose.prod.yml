services:
  traefik:
    image: traefik:v3.1
    container_name: app_traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # Pour activer HTTPS avec Let's Encrypt une fois un nom de domaine
      # pointé sur le serveur, décommenter ces lignes (et la section
      # "labels" HTTPS du service frontend ci-dessous) :
      # - --entrypoints.websecure.address=:443
      # - --certificatesresolvers.le.acme.httpchallenge=true
      # - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      # - --certificatesresolvers.le.acme.email=admin@example.com
      # - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - letsencrypt:/letsencrypt

  postgres:
    image: postgres:16
    container_name: app_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/imadbils/projet_collaboratif-backend:latest
    build:
      context: ./Back
      dockerfile: Dockerfile
    container_name: app_backend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/imadbils/projet_collaboratif-frontend:latest
    build:
      context: ./front-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: app_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=80"
      # Pour activer HTTPS (voir service traefik ci-dessus), remplacer
      # le rule ci-dessus par un Host() et ajouter :
      # - "traefik.http.routers.app.rule=Host(`mondomaine.fr`)"
      # - "traefik.http.routers.app-secure.rule=Host(`mondomaine.fr`)"
      # - "traefik.http.routers.app-secure.entrypoints=websecure"
      # - "traefik.http.routers.app-secure.tls.certresolver=le"

volumes:
  pgdata_prod:
  # letsencrypt:
