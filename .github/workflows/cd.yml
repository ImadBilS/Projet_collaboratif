name: CD

# Pipeline de déploiement continu.
#
# À chaque push sur "main" :
#   1. construit les images Docker du backend (Back/) et du frontend
#      (front-web/) ;
#   2. les publie sur le registre d'images GitHub (ghcr.io), taguées
#      "latest" et avec le SHA du commit ;
#   3. se connecte en SSH au serveur de production pour récupérer les
#      nouvelles images et redémarrer les services (docker compose pull
#      && docker compose up -d).
#
# Versioning : pour publier une version numérotée (ex: v1.0.0), créer et
# pousser un tag Git :
#   git tag v1.0.0 && git push origin v1.0.0
# Les images seront alors également publiées avec ce tag de version.
#
# Secrets nécessaires (déjà configurés côté GitHub par l'équipe) :
#   - SSH_HOST : adresse du serveur de production
#   - SSH_USER : utilisateur SSH
#   - SSH_KEY  : clé privée SSH correspondante
#
# Pré-requis côté serveur (une seule fois) :
#   - avoir cloné le dépôt dans ~/Projet_collaboratif
#   - avoir un fichier .env.prod renseigné (voir .env.prod.example)
#   - rendre les packages ghcr.io du dépôt "publics" (Settings > Packages),
#     afin que "docker compose pull" fonctionne sans authentification sur
#     le serveur.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/imadbils/projet_collaboratif-backend
  IMAGE_FRONTEND: ghcr.io/imadbils/projet_collaboratif-frontend

jobs:
  build-and-push:
    name: Build & push des images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Connexion à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push de l'image backend
        uses: docker/build-push-action@v6
        with:
          context: ./Back
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push de l'image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front-web
          push: true
          build-args: |
            VITE_API_URL=
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    name: Déploiement sur le serveur
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/Projet_collaboratif
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
