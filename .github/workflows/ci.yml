      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Audit de sécurité des dépendances
        working-directory: mobile
        run: |
          npm audit --json > audit.json || true
          LOW=$(jq '.metadata.vulnerabilities.low + .metadata.vulnerabilities.info' audit.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate' audit.json)
          HIGH=$(jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' audit.json)
          {
            echo "### 🔍 Audit des dépendances (mobile)"
            echo ""
            echo "- 🟢 Faible : $LOW"
            echo "- 🟠 Moyenne : $MODERATE"
            echo "- 🔴 Élevée/critique : $HIGH"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::$HIGH vulnérabilité(s) de sévérité élevée/critique dans mobile (voir 'npm audit')"
            exit 1
          fi

      - name: Run tests
        working-directory: mobile
        run: npm test
