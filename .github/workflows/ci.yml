name: CI
# Pipeline d'intégration continue : exécuté à chaque push et pull request,
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  back:
    name: Back (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Back/package-lock.json

      - name: Install dependencies
        working-directory: Back
        run: npm ci

      - name: Audit de sécurité des dépendances
        working-directory: Back
        run: |
          npm audit --json > audit.json || true
          LOW=$(jq '.metadata.vulnerabilities.low + .metadata.vulnerabilities.info' audit.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate' audit.json)
          HIGH=$(jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' audit.json)
          {
            echo "### 🔍 Audit des dépendances (Back)"
            echo ""
            echo "- 🟢 Faible : $LOW"
            echo "- 🟠 Moyenne : $MODERATE"
            echo "- 🔴 Élevée/critique : $HIGH"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::$HIGH vulnérabilité(s) de sévérité élevée/critique dans Back (voir 'npm audit')"
            exit 1
          fi

      - name: Run tests
        working-directory: Back
        run: npm test

  front-web:
    name: Front web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front-web/package-lock.json

      - name: Install dependencies
        working-directory: front-web
        run: npm ci

      - name: Audit de sécurité des dépendances
        working-directory: front-web
        run: |
          npm audit --json > audit.json || true
          LOW=$(jq '.metadata.vulnerabilities.low + .metadata.vulnerabilities.info' audit.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate' audit.json)
          HIGH=$(jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' audit.json)
          {
            echo "### 🔍 Audit des dépendances (front-web)"
            echo ""
            echo "- 🟢 Faible : $LOW"
            echo "- 🟠 Moyenne : $MODERATE"
            echo "- 🔴 Élevée/critique : $HIGH"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::$HIGH vulnérabilité(s) de sévérité élevée/critique dans front-web (voir 'npm audit')"
            exit 1
          fi

      - name: Lint
        working-directory: front-web
        run: npm run lint

      - name: Run tests
        working-directory: front-web
        run: npm test

      - name: Build
        working-directory: front-web
        run: npm run build

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
