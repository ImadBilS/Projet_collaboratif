# Dependabot : maintenance automatisée des dépendances.
#
# Pour chaque écosystème, Dependabot ouvre des pull requests hebdomadaires
# qui mettent à jour les dépendances (versions mineures/patch). La CI
# (.github/workflows/ci.yml) valide ensuite ces PR avant fusion.
version: 2
updates:
  # Backend (Node.js / Express / Prisma)
  - package-ecosystem: "npm"
    directory: "/Back"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # Les montées de version majeures cassent souvent des peer
      # dependencies et nécessitent une revue manuelle.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Front web (React / Vite)
  - package-ecosystem: "npm"
    directory: "/front-web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Mobile (React Native / Expo)
  # Les packages "expo-*"/"react-native-*" suivent le versionnage de
  # l'Expo SDK utilisé (actuellement SDK 54) : une montée majeure casse les
  # peer dependencies avec expo-router/expo. À mettre à jour uniquement via
  # "npx expo install" lors d'une migration de SDK.
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Images Docker (backend, frontend)
  - package-ecosystem: "docker"
    directory: "/Back"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/front-web"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Workflows GitHub Actions (ci.yml, cd.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
