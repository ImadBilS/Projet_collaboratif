# Dependabot : maintenance automatisée des dépendances.
version: 2
updates:
  # Backend (Node.js / Express / Prisma)
  - package-ecosystem: "npm"
    directory: "/Back"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Front web (React / Vite)
  - package-ecosystem: "npm"
    directory: "/front-web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Images Docker (backend, frontend)
  - package-ecosystem: "docker"
    directory: "/Back"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/front-web"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Workflows GitHub Actions (ci.yml, cd.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
