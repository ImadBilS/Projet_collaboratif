server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Toutes les routes de l'API back (Express) sont proxifiées vers le
    # service "backend" du réseau Docker, pour exposer un seul point
    # d'entrée (via Traefik) côté navigateur.
    location ~ ^/(api|ressources|stats|comments|replies|reacts|reports|notifications|collections|activities|health)(/|$) {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
