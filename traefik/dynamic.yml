# Configuration dynamique de Traefik (provider "file").
#
# On définit ici manuellement le routeur et le service qui pointent vers le
# conteneur "frontend" (résolu via le DNS interne de Docker Compose, sur le
# même réseau que Traefik). Cela évite de monter /var/run/docker.sock dans
# le conteneur Traefik (provider "docker"), ce qui simplifie la
# configuration et réduit la surface d'attaque.
http:
  routers:
    app:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: app
      # Pour activer HTTPS une fois un nom de domaine disponible, voir les
      # commentaires dans docker-compose.prod.yml (service traefik) et
      # remplacer la règle ci-dessus par "Host(`mondomaine.fr`)".

  services:
    app:
      loadBalancer:
        servers:
          - url: "http://frontend:80"
